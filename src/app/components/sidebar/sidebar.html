<aside class="w-64 h-screen bg-white border-r border-gray-200 dark:bg-gray-800 dark:border-gray-700">
    <div class="px-3 py-4 overflow-y-auto h-full flex flex-col">

        <!-- Logo / App name -->
        <div class="mb-6 px-2">
            <span class="text-xl font-semibold text-gray-800 dark:text-white">
                FinTrack
            </span>
        </div>

        <!-- Nav items -->
        <ul class="space-y-2">
        @for (item of navItems; track item.route) {
            <app-sidebar-item [item]="item"></app-sidebar-item>
        }
        </ul>

    </div>
</aside>
